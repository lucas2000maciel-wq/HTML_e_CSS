<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body{
            background-color: lightskyblue;
        }
    </style>
</head>
<body>
    <a href="#" onclick="clicou()">Clique em min!</a>
    <div id="saída"></div>

    <script>
        function clicou(){
            s = window.document.getElementById("saída")
            s.innerHTML += '<p>Voçe Clicou!</p>'
        }
    </script>
</body>
</html>
