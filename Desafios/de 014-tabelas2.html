<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Desafio Tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 300px;
            border-collapse: collapse;
        }

        th{
            background-color: darkgrey;
            color: rgb(245, 244, 241);
            padding: 10px;
            border: 1px solid black;
        }

        td{
         text-align: center;
         padding: 10px;
         border: 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th rowspan="2" scope="col">Área</th>
            <th rowspan="2" colspan="2" scope="colgroup">Disciplinas</th>
            <th colspan="2" scope="colgroup">Notas</th>
            <th rowspan="2" scope="col">Média</th>
        </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        
        <tr>
            <td rowspan="4"><b>Exatas</b></td>
            <td colspan="2">Matemática</td>
            <td>6.2</td>
            <td>7.0</td>
            <td>7.5</td>
        </tr>
        <tr>
            <td colspan="2">Física</td>
            <td>6.2</td>
            <td>7.0</td>
            <td>7.5</td>
        </tr>
        <tr>
            <td colspan="2">Química</td>
            <td>6.2</td>
            <td>7.0</td>
            <td>7.5</td>
        </tr>
        <tr>
            <td colspan="2">Biologia</td>
            <td>6.2</td>
            <td>7.0</td>
            <td>7.5</td>
        </tr>
        <tr>
            <th colspan="5" scope="colgroup">Média de Exatas</th>
            <th>7.2</th>
        </tr>
        <tr>
            <td rowspan="2"><b>Humanas</b></td>
            <td colspan="2">História</td>
            <td>6.2</td>
            <td>7.0</td>
            <td>7.5</td>
        </tr>
        <tr>
          <td colspan="2">Geografia</td>
          <td>6.2</td>
          <td>7.0</td>
          <td>7.5</td>
        </tr>
        <tr>
          <th colspan="5" scope="row">Média de Humanas</th>
          <th>7.2</th>
        </tr>
    </table>
</body>
</html>
